name: Laravel ERP Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: stock_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: stock_test
      DB_USERNAME: root
      DB_PASSWORD: root

      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local

      NVIDIA_API_KEY: dummy
      NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
      NVIDIA_MODEL: nvidia/nemotron-nano-12b-v2-vl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, xml, ctype, fileinfo, tokenizer
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend assets
        run: npm run build

      - name: Prepare Laravel
        run: |
          cat > .env <<EOF
          APP_NAME=Laravel
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://127.0.0.1

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=stock_test
          DB_USERNAME=root
          DB_PASSWORD=root

          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local

          NVIDIA_API_KEY=dummy
          NVIDIA_BASE_URL=https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL=nvidia/nemotron-nano-12b-v2-vl
          EOF

          php artisan key:generate
          php artisan config:clear

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Run tests
        run: php artisan test